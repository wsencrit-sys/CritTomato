<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crit Tomato</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <div id="app">
    <!-- Title bar (drag region for frameless window) -->
    <header id="titlebar" data-tauri-drag-region>
      <span class="app-name">Crit Tomato</span>
      <div class="window-controls">
        <div class="settings-wrap">
          <button id="btn-settings" class="win-btn" title="Settings">
            <img class="icon-gear" src="images/ChiLun_logo.png" alt="" />
          </button>
          <!-- Settings Modal -->
          <div id="settings-modal" class="settings-modal">
            <div class="settings-modal-content">
              <div class="settings-modal-header">
                <h3 data-i18n="settings.title">Settings</h3>
              </div>
              <div class="settings-modal-body">
                <div class="settings-row">
                  <span data-i18n="lang.label">Language</span>
                  <button id="btn-lang" class="toggle-btn">中文</button>
                </div>
                <div class="settings-row">
                  <span data-i18n="settings.format">Time Format</span>
                  <button id="btn-format" class="toggle-btn">24小时</button>
                </div>
                <div class="settings-separator"></div>
                <div class="settings-row">
                  <span data-i18n="settings.autostart">Launch on boot</span>
                  <button id="btn-autostart" class="toggle-btn">关</button>
                </div>
                <div class="settings-separator"></div>
                <div class="settings-row">
                  <span data-i18n="settings.opacity">Opacity</span>
                  <div class="slider-wrap">
                    <input type="range" id="opacity-slider" min="0" max="100" value="50">
                    <input type="text" inputmode="numeric" pattern="[0-9]*" id="opacity-value" value="50" class="opacity-input">
                  </div>
                </div>
                <div class="settings-separator"></div>
                <div class="settings-row col">
                  <span data-i18n="settings.break_text">Break popup text</span>
                  <input type="text" id="break-popup-text-input" class="settings-input"
                         data-i18n-placeholder="pomo.break_popup" maxlength="30">
                </div>
                <div class="settings-row col">
                  <span data-i18n="settings.focus_text">Focus popup text</span>
                  <input type="text" id="focus-popup-text" class="settings-input"
                         data-i18n-placeholder="pomo.focus_popup" maxlength="30">
                </div>
              </div>
            </div>
          </div>
        </div>
        <button id="btn-pin" class="win-btn" title="Toggle Always on Top">
          <img class="icon-pin" src="images/TuDing_logo.png" alt="" />
        </button>
        <button id="btn-minimize" class="win-btn" title="Minimize to Tray">─</button>
      </div>
    </header>
    <!-- Mini Settings Modal — outside titlebar to avoid drag-region capture -->
    <div id="settings-modal-mini" class="settings-modal settings-modal-mini">
      <div class="settings-modal-content">
        <div class="settings-modal-header">
          <h3 data-i18n="settings.clock_opacity">透明度</h3>
          <div class="slider-wrap">
            <input type="range" id="clock-opacity-slider" min="0" max="90" value="20">
            <input type="text" inputmode="numeric" pattern="[0-9]*" id="clock-opacity-value" value="20" class="clock-opacity-input">
          </div>
        </div>
      </div>
    </div>

    <main>
      <!-- Main Clock -->
      <section id="main-clock" class="clock-section">
        <div class="time" id="local-time">00:00:00</div>
        <div class="date" id="local-date">Wednesday, January 1</div>
        <div class="tz-indicator" id="tz-indicator" data-i18n="tz.local">🏠 Local</div>
      </section>

      <!-- Timezones -->
      <section id="timezones" class="tz-section">
        <div class="section-header">
          <h3 data-i18n="tz.title">🌍 Time Zone</h3>
        </div>
        <div class="tz-selector">
          <select id="tz-select" class="tz-select">
            <option value="local" data-i18n="tz.local">🏠 Local</option>
          </select>
        </div>
      </section>

      <!-- Pomodoro Timer -->
      <section id="pomodoro" class="pomo-section">
        <div class="section-header">
          <h3 data-i18n="pomo.title">⏱ Pomodoro</h3>
        </div>
        <div class="pomo-ring-container">
          <svg class="pomo-ring" viewBox="0 0 120 120">
            <circle class="pomo-ring-bg" cx="60" cy="60" r="52" />
            <circle class="pomo-ring-progress" cx="60" cy="60" r="52"
                    id="pomo-circle" />
          </svg>
          <div class="pomo-time" id="pomo-display">25:00</div>
        </div>
        <div class="pomo-label">
          <span id="pomo-label-text" data-i18n="pomo.ready">Ready</span>
        </div>
        <div class="pomo-controls">
          <button id="btn-pomo-start" class="pomo-btn start" data-i18n="pomo.start">▶ Start</button>
          <button id="btn-pomo-reset" class="pomo-btn reset" data-i18n="pomo.reset">↺ Reset</button>
        </div>
        <div class="pomo-settings">
          <label><span data-i18n="pomo.work_label">Work</span> <input type="number" id="work-minutes" value="45" min="1" max="120"> <span data-i18n="pomo.min">min</span></label>
          <label><span data-i18n="pomo.break_label">Break</span> <input type="number" id="break-minutes" value="5" min="1" max="60"> <span data-i18n="pomo.min">min</span></label>
        </div>
        <div class="pomo-counter">
          <img class="icon-tomato" src="images/tomato01.png" alt="" />
          × <span id="tomato-count">0</span>
        </div>
      </section>
    </main>

    <!-- Break / Focus reminder popup -->
    <div id="break-popup" class="break-popup">
      <div class="break-popup-content">
        <p class="break-popup-text" id="break-popup-text">休息时间，起立！</p>
        <button id="btn-break-go" class="pomo-btn start">去活动</button>
      </div>
    </div>

    <!-- Resize grip (visible in mini mode) -->
    <div id="resize-grip" class="resize-grip"></div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
